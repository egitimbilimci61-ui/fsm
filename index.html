
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Akıllı Anket Sistemi</title>

<script type="text/javascript" src="https://me.kis.v2.scr.kaspersky-labs.com/FD126C42-EBFA-4E12-B309-BB3FDD723AC1/main.js?attr=W6Kek544uLn1mY2V3-D_OEoWY1zNCOnM1GiUajBEbHjbJ6YSesvJgnTeQwZOkq347KIBrm41yZj_Yjqak7qg_zj5Chaxa58Xzbf_jfrMANWnU3T-3wfNuhB9yyHQhlmJ96VeMVlBscQUMT72Mqc8TwqwfGN1EBfn5GJH6BODOD6yIQRbIQipqwiaz-enfeJpYXOCwP7K79w75lL94usW58Va0KKiRnVIv1oEQG3V6kCk_Kmo9IL50iHGtBPEco5O1181rksb3kd-9QTXTRSIBg" charset="UTF-8"></script><script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<style>
body { font-family: Arial; text-align:center; }
.logo-card { border:1px solid #ccc; padding:10px; margin:10px; cursor:pointer; }
.selected { border:2px solid green; }
</style>
</head>

<body>

<h2>Akıllı Anket Sistemi</h2>

<div id="poll"></div>

<button onclick="submitVote()">Oy Ver</button>

<h3>Sonuçlar</h3>
<pre id="results"></pre>

<h3>AI Yorum</h3>
<pre id="ai"></pre>

<script>
// ================= INIT =================
let appStarted = false;
let selected = null;
let votes = [];

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyCJMoseVi5ZLELeIv413Uv00lUPkPXgmsQ",
  authDomain: "okul-logo-anketi.firebaseapp.com",
  databaseURL: "https://okul-logo-anketi-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "okul-logo-anketi",
  storageBucket: "okul-logo-anketi.firebasestorage.app",
  messagingSenderId: "251108485343",
  appId: "1:251108485343:web:5c1bcf1dcb905fde74e16a",
  measurementId: "G-2HYE1VF2Z8"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

document.addEventListener("DOMContentLoaded", () => {
  if (!appStarted) {
    appStarted = true;
    initApp();
  }
});

function initApp() {
  buildUI();
  listenVotesRealtime();
}

// ================= UI =================
function buildUI() {
  const poll = document.getElementById("poll");
  poll.innerHTML = "";

  for (let i = 1; i <= 5; i++) {
    const div = document.createElement("div");
    div.className = "logo-card";
    div.innerText = "Logo " + i;

    div.onclick = () => {
      document.querySelectorAll(".logo-card").forEach(x => x.classList.remove("selected"));
      div.classList.add("selected");
      selected = "Logo " + i;
    };

    poll.appendChild(div);
  }
}

// ================= VOTE =================
async function submitVote() {
  if (!selected) {
    alert("Seçim yap!");
    return;
  }

  await db.collection("votes").add({
    logo: selected,
    time: Date.now()
  });
}

// ================= REALTIME =================
function listenVotesRealtime() {
  db.collection("votes").onSnapshot(snapshot => {
    votes = [];
    snapshot.forEach(doc => votes.push(doc.data()));
    renderResults();
    aiAnalyze();
  });
}

// ================= RESULTS =================
function renderResults() {
  const counts = {};

  votes.forEach(v => {
    counts[v.logo] = (counts[v.logo] || 0) + 1;
  });

  document.getElementById("results").innerText = JSON.stringify(counts, null, 2);
}

// ================= AI ANALYSIS =================
function aiAnalyze() {
  if (votes.length === 0) return;

  const counts = {};
  votes.forEach(v => {
    counts[v.logo] = (counts[v.logo] || 0) + 1;
  });

  let winner = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);

  let total = votes.length;
  let winRate = ((counts[winner] / total) * 100).toFixed(1);

  let yorum = "";

  if (winRate > 50) {
    yorum = "Net bir kazanan var: " + winner;
  } else if (winRate > 30) {
    yorum = "Rekabet yüksek, öne çıkan: " + winner;
  } else {
    yorum = "Dağınık oylar, net lider yok.";
  }

  document.getElementById("ai").innerText =
    "Toplam Oy: " + total + "\n" +
    "Kazanan: " + winner + "\n" +
    "Oran: %" + winRate + "\n" +
    "Yorum: " + yorum;
}
</script>

</body>
</html>
