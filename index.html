<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="data:,"> <title>FSMAL Logo Anketi Pro</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@4/dist/fp.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    
    <style>
        /* SİZİN STİLLERİNİZ */
        *{box-sizing:border-box;margin:0;padding:0}html,body{font-family:sans-serif;color:#333;background:#f4f4f9}body{padding:.75rem}.tab-bar{display:flex;margin-bottom:1.25rem;border-bottom:1px solid #ddd;overflow-x:auto}.tab{padding:10px 15px;font-size:13px;cursor:pointer;border:none;background:transparent;color:#666;border-bottom:2px solid transparent}.tab.active{color:#534AB7;border-bottom:2px solid #7F77DD;font-weight:600}.view{display:none}.view.active{display:block}.btn-p{background:#7F77DD;color:#fff;border:none;border-radius:8px;padding:10px 18px;font-size:14px;cursor:pointer}.btn-o{background:transparent;border:1px solid #ccc;border-radius:8px;padding:10px 14px;font-size:14px;color:#666}.btn-row{display:flex;justify-content:flex-end;gap:8px;margin-top:10px}/* Anket adımları */.step{display:none}.step.active{display:block}.progress-bar{width:100%;height:6px;background:#eee;border-radius:3px;margin-bottom:1rem}.progress-fill{height:100%;background:#7F77DD;transition:width .3s}.opt-btn{width:100%;padding:14px;margin-bottom:8px;border:1px solid #ccc;border-radius:10px;text-align:left;background:#fff;cursor:pointer}.opt-btn.selected{border:2px solid #7F77DD;background:#EEEDFE}.logo-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.logo-card{border:1px solid #ddd;border-radius:12px;padding:10px;text-align:center;background:#fff}.logo-card.selected{border:2px solid #7F77DD}.img-box{width:100%;aspect-ratio:1;background:#eee;margin-bottom:5px;overflow:hidden}.img-box img{width:100%;height:100%;object-fit:contain}
        
        /* MODERN FORMA PREVIEW */
        .preview-box {
            position: relative;
            width: 160px; height: 160px;
            margin: 10px auto;
            background: #fff;
            border: 1px dashed #7F77DD;
            border-radius: 10px;
        }
        .base-forma { width: 100%; height: 100%; object-fit: contain; }
        .logo-overlay {
            position: absolute; top: 28%; left: 50%;
            transform: translateX(-50%);
            width: 35px; height: 35px;
            mix-blend-mode: multiply; opacity: 0.8;
        }
        .overlay-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;align-items:center;justify-content:center}
        .lock-card{background:#fff;padding:2rem;border-radius:15px;text-align:center;max-width:300px}
        .err-msg{color:red;font-size:12px;margin:5px 0;display:none}
    </style>
</head>
<body>

<div class="overlay-bg" id="admin-overlay">
    <div class="lock-card">
        <h3>Yönetim Kilidi</h3>
        <p style="font-size:12px; margin-bottom:10px">Şifre: admin123 (Değiştirilmediyse)</p>
        <input type="password" id="admin-pass-inp" style="width:100%; padding:10px; margin-bottom:10px">
        <div id="admin-err" class="err-msg">Hatalı Şifre!</div>
        <button class="btn-p" onclick="chkAdmin()">Giriş Yap</button>
        <button class="btn-o" onclick="closeOverlay()">İptal</button>
    </div>
</div>

<div class="tab-bar">
    <button class="tab" id="tab-admin" onclick="tryAdmin()">Yönetim</button>
    <button class="tab active" id="tab-poll" onclick="switchTab('poll')">Anket</button>
    <button class="tab" id="tab-results" onclick="switchTab('results')">Sonuçlar</button>
</div>

<div class="view" id="view-admin">
    <div style="background:#EEEDFE; padding:15px; border-radius:10px; font-size:13px; margin-bottom:15px">
        🛡️ <b>Güvenlik:</b> Bcrypt ve Cihaz Bazlı Filtreleme aktif.
    </div>
    <div class="pass-row">
        <input type="password" id="admin-pass-set" placeholder="Yeni Admin Şifresi">
        <button class="btn-p" onclick="saveAdminPass()">Şifreyi Güncelle</button>
    </div>
    <hr style="margin:20px 0">
    <div id="admin-grid" class="logo-grid"></div>
    <button class="btn-p" onclick="saveAdmin()" style="margin-top:20px; width:100%">Tüm Ayarları Kaydet</button>
</div>

<div class="view active" id="view-poll">
    <div id="poll-inner">
        <h1>Okul Logosu Anketi</h1>
        <div class="progress-bar"><div class="progress-fill" id="prog" style="width:14%"></div></div>
        
        <div class="step active" id="s1">
            <p class="question">Cinsiyetiniz?</p>
            <div id="opts-gender"></div>
            <div class="btn-row"><button class="btn-p" id="n1" onclick="go(2)" disabled>Devam</button></div>
        </div>

        <div class="step" id="s2">
            <p class="question">Sınıfınız?</p>
            <div id="opts-class"></div>
            <div class="btn-row"><button class="btn-o" onclick="go(1)">Geri</button><button class="btn-p" id="n2" onclick="go(3)" disabled>Devam</button></div>
        </div>

        <div class="step" id="s3">
            <p class="question">Hangi logo daha iyi?</p>
            <div id="cmp-area" style="display:flex; align-items:center; gap:10px"></div>
            <div class="btn-row"><button class="btn-o" onclick="go(2)">Geri</button><button class="btn-p" id="n3" onclick="go(4)" disabled>Devam</button></div>
        </div>

        <div class="step" id="s4">
            <p class="question">Favori Logonuz?</p>
            <div id="forma-preview-area"></div>
            <div id="poll-logo-grid" class="logo-grid"></div>
            <div class="btn-row"><button class="btn-o" onclick="go(3)">Geri</button><button class="btn-p" id="n4" onclick="go(5)" disabled>Devam</button></div>
        </div>

        <div class="step" id="s5">
            <p class="question">Neden bu seçim?</p>
            <div id="opts-reason"></div>
            <div class="btn-row"><button class="btn-o" onclick="go(4)">Geri</button><button class="btn-p" id="n5" onclick="go(6)" disabled>Devam</button></div>
        </div>

        <div class="step" id="s6">
            <p class="question">Puanınız ve Yorumunuz</p>
            <div class="star-row" id="stars" style="font-size:30px; cursor:pointer; color:#ccc; margin-bottom:15px">
                <span onclick="rateStar(1)">★</span><span onclick="rateStar(2)">★</span><span onclick="rateStar(3)">★</span><span onclick="rateStar(4)">★</span><span onclick="rateStar(5)">★</span>
            </div>
            <textarea id="yorum" style="width:100%; height:80px; padding:10px" placeholder="Yorumunuz..."></textarea>
            <div class="btn-row"><button class="btn-o" onclick="go(5)">Geri</button><button class="btn-p" id="n6" onclick="submitPoll()" disabled>Gönder</button></div>
        </div>

        <div class="step" id="s7">
            <h3>Teşekkürler!</h3>
            <p>Seçiminiz kaydedildi.</p>
        </div>
    </div>
</div>

<div class="view" id="view-results">
    <div id="results-inner"></div>
</div>

<script>
/* ---- GÜVENLİK VE AYARLAR ---- */
const FB = 'https://firestore.googleapis.com/v1/projects/okul-logo-anketi/databases/(default)/documents';
let cfg = { adminPassHash: '' }, logos = [], pdata = { deviceId: '' };

// 1. Fonksiyonların Global Tanımı (tryAdmin Hatası İçin)
window.tryAdmin = function() {
    document.getElementById('admin-overlay').style.display = 'flex';
};

window.closeOverlay = function() {
    document.getElementById('admin-overlay').style.display = 'none';
};

window.chkAdmin = function() {
    const input = document.getElementById('admin-pass-inp').value;
    const hasher = window.dcodeIO ? window.dcodeIO.bcrypt : null;
    let ok = false;
    
    if (hasher && cfg.adminPassHash) {
        ok = hasher.compareSync(input, cfg.adminPassHash);
    } else {
        ok = (input === "admin123");
    }

    if (ok) {
        closeOverlay();
        switchTab('admin');
        buildAdminGrid();
    } else {
        document.getElementById('admin-err').style.display = 'block';
    }
};

window.saveAdminPass = async function() {
    const p = document.getElementById('admin-pass-set').value;
    const hasher = window.dcodeIO ? window.dcodeIO.bcrypt : null;
    if (!hasher) return alert("Kütüphane henüz yüklenmedi.");
    
    const hash = hasher.hashSync(p, 10);
    await fetch(`${FB}/config/main?updateMask.fieldPaths=adminPassHash`, {
        method: 'PATCH',
        body: JSON.stringify({ fields: { adminPassHash: { stringValue: hash } } })
    });
    alert("Şifre güncellendi.");
};

// 2. Parmak İzi (Fingerprint)
async function initSecurity() {
    try {
        const FP = window.FingerprintJS;
        if (FP) {
            const fp = await FP.load();
            const result = await fp.get();
            pdata.deviceId = result.visitorId;
        } else {
            pdata.deviceId = 'id_' + Math.random().toString(36).substr(2, 9);
        }
    } catch(e) { pdata.deviceId = 'fallback_' + Date.now(); }
}

// 3. UI Mantığı
window.switchTab = function(t) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(tb => tb.classList.remove('active'));
    document.getElementById('view-' + t).classList.add('active');
    document.getElementById('tab-' + t).classList.add('active');
    if (t === 'poll') buildPollGrid();
};

window.go = function(n) {
    document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
    document.getElementById('s' + n).classList.add('active');
    document.getElementById('prog').style.width = (n / 7 * 100) + '%';
};

window.pick = function(btn, key, val) {
    btn.parentElement.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    pdata[key] = val;
    document.getElementById('n' + btn.closest('.step').id.substring(1)).disabled = false;
};

window.rateStar = function(n) {
    pdata.yildiz = n;
    document.querySelectorAll('#stars span').forEach((s, i) => s.style.color = (i < n ? '#F0A500' : '#ccc'));
    document.getElementById('n6').disabled = false;
};

// 4. Veri Senkronizasyonu
async function loadAll() {
    try {
        const r = await fetch(`${FB}/config/main`).then(res => res.json());
        if (r.fields) {
            cfg.adminPassHash = r.fields.adminPassHash ? r.fields.adminPassHash.stringValue : '';
        }
        const lr = await fetch(`${FB}/config/logos`).then(res => res.json());
        if (lr.fields) logos = JSON.parse(lr.fields.list.stringValue);
    } catch(e) { console.log("Veri çekilemedi."); }
}

function buildPollGrid() {
    const g = document.getElementById('poll-logo-grid'); g.innerHTML = '';
    logos.forEach(l => {
        const d = document.createElement('div'); d.className = 'logo-card';
        d.innerHTML = `<div class="img-box"><img src="${l.img||''}"></div><p>${l.name}</p>`;
        d.onclick = () => {
            document.querySelectorAll('.logo-card').forEach(x => x.classList.remove('selected'));
            d.classList.add('selected'); pdata.logo = l.name;
            document.getElementById('n4').disabled = false;
            showFormaPreview(l);
        };
        g.appendChild(d);
    });
}

function showFormaPreview(logo) {
    const area = document.getElementById('forma-preview-area');
    area.innerHTML = `
        <div class="preview-box">
            <img src="https://www.freeiconspng.com/uploads/t-shirt-png-blank-t-shirt-png-transparent-image-8.png" class="base-forma">
            ${logo.img ? `<img src="${logo.img}" class="logo-overlay">` : ''}
        </div>
    `;
}

window.submitPoll = async function() {
    const btn = document.getElementById('n6'); btn.disabled = true;
    const body = { fields: { 
        deviceId: { stringValue: pdata.deviceId },
        logo: { stringValue: pdata.logo },
        yorum: { stringValue: document.getElementById('yorum').value },
        zaman: { stringValue: new Date().toISOString() }
    }};
    await fetch(`${FB}/votes`, { method: 'POST', body: JSON.stringify(body) });
    go(7);
};

// Başlatıcı
(async function init() {
    await initSecurity();
    await loadAll();
    
    // Seçenekleri doldur
    const gen = ['Erkek', 'Kız', 'Diğer'], cls = ['9', '10', '11', '12'], rs = ['Renk', 'Sadelik', 'Duruş'];
    const fill = (id, arr, k) => {
        const el = document.getElementById(id);
        arr.forEach(a => {
            const b = document.createElement('button'); b.className = 'opt-btn'; b.textContent = a;
            b.onclick = () => pick(b, k, a); el.appendChild(b);
        });
    };
    fill('opts-gender', gen, 'cinsiyet'); fill('opts-class', cls, 'sinif'); fill('opts-reason', rs, 'neden');
})();

function buildAdminGrid() {
    const g = document.getElementById('admin-grid'); g.innerHTML = '';
    logos.forEach((l, i) => {
        const d = document.createElement('div'); d.className = 'logo-card';
        d.innerHTML = `<div class="img-box"><img src="${l.img||''}"></div><input value="${l.name}" onchange="logos[${i}].name=this.value" style="width:100%">`;
        g.appendChild(d);
    });
}
</script>
</body>
</html>
