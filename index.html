<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FSMAL Logo Anketi</title>
    <style>
        :root { --p: #7F77DD; --p-dark: #534AB7; --bg: #fff; --bg-s: #f8f9fa; --txt: #1a1a1a; --brd: #ddd; }
        *{box-sizing:border-box;margin:0;padding:0; -webkit-tap-highlight-color:transparent}
        body{font-family:sans-serif;color:var(--txt);background:var(--bg);padding:1rem;line-height:1.4}
        .tab-bar{display:flex;border-bottom:1px solid #eee;margin-bottom:1.5rem}
        .tab{flex:1;padding:12px;font-size:13px;cursor:pointer;border:none;background:none;color:#666;border-bottom:2px solid transparent}
        .tab.active{color:var(--p-dark);border-bottom-color:var(--p);font-weight:600}
        .view{display:none}.view.active{display:block}
        .btn-p{background:var(--p);color:#fff;border:none;border-radius:8px;padding:14px;font-size:15px;cursor:pointer;font-weight:500;width:100%}
        .btn-p:disabled{background:#ccc;cursor:not-allowed}
        .btn-o{background:none;border:1px solid #ccc;border-radius:8px;padding:12px;font-size:14px;cursor:pointer;color:#666;width:100%}
        .btn-row{display:flex;gap:8px;margin-top:12px}
        .admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:1rem 0}
        .admin-card{border:1px solid var(--brd);border-radius:12px;padding:10px;text-align:center}
        .img-box{width:100%;aspect-ratio:1;border-radius:6px;background:var(--bg-s);border:1px solid var(--brd);overflow:hidden;display:flex;align-items:center;justify-content:center;position:relative}
        .img-box img{width:100%;height:100%;object-fit:contain}
        .logo-name-input{width:100%;border:1px solid #ccc;border-radius:6px;padding:6px;font-size:12px;margin-top:4px}
        .progress-bar{width:100%;height:6px;background:#eee;border-radius:3px;margin-bottom:1.5rem;overflow:hidden}
        .progress-fill{height:100%;background:var(--p);transition:width .4s;width:14%}
        .step{display:none}.step.active{display:block}
        .question{font-size:17px;font-weight:600;margin-bottom:1.2rem}
        .options{display:flex;flex-direction:column;gap:10px;margin-bottom:1.5rem}
        .opt-btn{background:var(--bg);border:1px solid #ccc;border-radius:10px;padding:14px;font-size:15px;cursor:pointer;text-align:left}
        .opt-btn.selected{border:2px solid var(--p);background:#EEEDFE;color:var(--p-dark);font-weight:600}
        .logo-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.5rem}
        .logo-card{border:1px solid var(--brd);border-radius:12px;padding:8px;text-align:center;cursor:pointer}
        .logo-card.selected{border:2px solid var(--p);background:#EEEDFE}
        .lc-img{width:100%;aspect-ratio:1;border-radius:6px;overflow:hidden;background:#f0f0f0}
        .lc-img img{width:100%;height:100%;object-fit:contain}
        .cmp-outer{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;margin-bottom:10px}
        .cmp-card{border:1px solid var(--brd);border-radius:12px;padding:10px;text-align:center;cursor:pointer}
        .star-row{display:flex;gap:10px;margin-bottom:1.5rem;justify-content:center}
        .star{font-size:35px;cursor:pointer;color:#ddd}.star.lit{color:#F0A500}
        textarea{width:100%;border:1px solid #ccc;border-radius:8px;padding:10px;min-height:90px;font-size:14px}
        .overlay-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:999;align-items:center;justify-content:center}
        .lock-card{background:#fff;padding:2rem;border-radius:15px;width:90%;max-width:320px;text-align:center}
        .lock-card input{width:100%;padding:12px;margin:15px 0;border-radius:8px;border:1px solid #ccc;text-align:center}
    </style>
</head>
<body>

<div class="overlay-bg" id="admin-overlay">
  <div class="lock-card">
    <h3>Yönetici Girişi</h3>
    <input type="password" id="admin-pass-inp" placeholder="Şifre">
    <button class="btn-p" onclick="chkAdmin()">Giriş</button>
  </div>
</div>

<div class="tab-bar">
  <button class="tab" id="tab-admin" onclick="tryAdmin()">Yönetim</button>
  <button class="tab active" id="tab-poll" onclick="switchTab('poll')">Anket</button>
  <button class="tab" id="tab-results" onclick="switchTab('results')">Sonuçlar</button>
</div>

<div class="view" id="view-admin">
    <div id="fb-status" style="font-size:11px; margin-bottom:10px">Durum: Bekleniyor...</div>
    <div style="background:#eee; padding:10px; border-radius:8px; margin-bottom:10px">
        <label><input type="checkbox" id="poll-open-chk" onchange="cfg.pollOpen=this.checked"> Anket Açık</label>
    </div>
    <div class="admin-grid" id="admin-grid"></div>
    <button class="btn-p" id="save-btn" onclick="saveAdmin()">AYARLARI KAYDET</button>
    <button class="btn-o" onclick="clearVotes()" style="color:red; margin-top:10px">Oyları Sıfırla</button>
</div>

<div class="view active" id="view-poll">
  <div id="poll-closed-box" style="display:none;text-align:center;padding:2rem"><h2>Anket Kapalı</h2></div>
  <div id="poll-inner">
    <h1>FSMAL Logo Seçimi</h1>
    <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
    
    <div class="step active" id="s1">
      <p class="question">Cinsiyetin?</p>
      <div class="options" id="opts-gender"></div>
      <button class="btn-p" id="n1" onclick="go(2)" disabled>Devam Et</button>
    </div>

    <div class="step" id="s2">
      <p class="question">Sınıfın?</p>
      <div class="options" id="opts-class"></div>
      <div class="btn-row"><button class="btn-o" onclick="go(1)">Geri</button><button class="btn-p" id="n2" onclick="go(3)" disabled style="flex:1">Devam</button></div>
    </div>

    <div class="step" id="s3">
      <p class="question">Sence hangisi daha güzel?</p>
      <div class="cmp-outer" id="cmp-area"></div>
      <div class="btn-row"><button class="btn-o" onclick="go(2)">Geri</button><button class="btn-p" id="n3" onclick="go(4)" disabled style="flex:1">Devam</button></div>
    </div>

    <div class="step" id="s4">
        <p class="question">Favori Logon?</p>
        <div class="logo-grid" id="poll-logo-grid"></div>
        <div class="btn-row"><button class="btn-o" onclick="go(3)">Geri</button><button class="btn-p" id="n4" onclick="go(5)" disabled style="flex:1">Seçtim</button></div>
    </div>

    <div class="step" id="s5">
      <p class="question">Neden bu seçim?</p>
      <div class="options" id="opts-reason"></div>
      <div class="btn-row"><button class="btn-o" onclick="go(4)">Geri</button><button class="btn-p" id="n5" onclick="go(6)" disabled style="flex:1">İleri</button></div>
    </div>

    <div class="step" id="s6">
      <p class="question">Puanla ve Bitir</p>
      <div class="star-row">
        <span class="star" onclick="rateStar(1)">★</span><span class="star" onclick="rateStar(2)">★</span><span class="star" onclick="rateStar(3)">★</span><span class="star" onclick="rateStar(4)">★</span><span class="star" onclick="rateStar(5)">★</span>
      </div>
      <textarea id="yorum" placeholder="Eklemek istediğin not..."></textarea>
      <button class="btn-p" id="n6" onclick="submitPoll()" disabled style="background:#3B6D11; margin-top:10px">GÖNDER</button>
    </div>

    <div class="step" id="s7" style="text-align:center">
      <h2>Teşekkürler!</h2>
      <button class="btn-p" onclick="location.reload()" style="margin-top:20px">Yeni Anket</button>
    </div>
  </div>
</div>

<div class="view" id="view-results">
    <div id="results-inner" style="padding:10px"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
const FB_URL = 'https://firestore.googleapis.com/v1/projects/okul-logo-anketi/databases/(default)/documents';
let logos = [], votes = [], cfg = {pollOpen:true, adminPass:'admin123', logoCount:10};
let pdata = {cinsiyet:null, sinif:null, logo:null, neden:null, yildiz:0, cmpWins:{}};
let cmpIdx = 0, cmpPairs = [], adminOK = false;

// Firebase Dönüştürücüler
const toFs = (obj) => {
    let f = {};
    Object.entries(obj).forEach(([k,v]) => {
        if(v === null) f[k] = {nullValue: null};
        else if(typeof v === 'boolean') f[k] = {booleanValue: v};
        else if(typeof v === 'number') f[k] = {integerValue: String(v)};
        else f[k] = {stringValue: String(v)};
    });
    return {fields: f};
};
const fromFs = (f) => {
    let o = {}; if(!f) return o;
    Object.entries(f).forEach(([k,v]) => {
        if(v.stringValue !== undefined) o[k] = v.stringValue;
        else if(v.integerValue !== undefined) o[k] = Number(v.integerValue);
        else if(v.booleanValue !== undefined) o[k] = v.booleanValue;
    });
    return o;
};

// Veri Çekme
async function loadCfg() {
    try {
        const mRes = await fetch(`${FB_URL}/config/main`);
        const mData = await mRes.json();
        if(mData.fields) Object.assign(cfg, fromFs(mData.fields));
        
        const lRes = await fetch(`${FB_URL}/logos`);
        const lData = await lRes.json();
        
        logos = Array.from({length: cfg.logoCount}, (_, i) => ({name:'Logo '+(i+1), img:null}));
        if(lData.documents) {
            lData.documents.forEach(doc => {
                const idx = parseInt(doc.name.split('_').pop());
                if(idx < cfg.logoCount) logos[idx] = fromFs(doc.fields);
            });
        }
        document.getElementById('fb-status').innerHTML = "🟢 Bağlı";
        updateUI();
    } catch(e) { document.getElementById('fb-status').innerHTML = "🔴 Bağlantı Kurulamadı"; }
}

async function saveAdmin() {
    const b = document.getElementById('save-btn'); b.textContent = 'Kaydediliyor...'; b.disabled = true;
    try {
        await fetch(`${FB_URL}/config/main`, {method:'PATCH', body:JSON.stringify(toFs(cfg))});
        for(let i=0; i<logos.length; i++) {
            await fetch(`${FB_URL}/logos/logo_${i}`, {method:'PATCH', body:JSON.stringify(toFs(logos[i]))});
        }
        alert('Kaydedildi!');
    } catch(e) { alert('Kaydetme hatası!'); }
    b.textContent = 'AYARLARI KAYDET'; b.disabled = false;
}

function trigUp(i) {
    const inp = document.createElement('input'); inp.type='file'; inp.accept='image/*';
    inp.onchange = e => {
        const f = e.target.files[0]; if(!f) return;
        const r = new FileReader();
        r.onload = ev => {
            const img = new Image();
            img.onload = () => {
                const cvs = document.createElement('canvas');
                const max = 400; let w=img.width, h=img.height;
                if(w>h) { if(w>max){ h*=max/w; w=max; } } else { if(h>max){ w*=max/h; h=max; } }
                cvs.width=w; cvs.height=h;
                cvs.getContext('2d').drawImage(img,0,0,w,h);
                logos[i].img = cvs.toDataURL('image/jpeg', 0.7);
                buildAdminGrid();
            };
            img.src = ev.target.result;
        };
        r.readAsDataURL(f);
    };
    inp.click();
}

function updateUI() {
    document.getElementById('poll-closed-box').style.display = cfg.pollOpen ? 'none' : 'block';
    document.getElementById('poll-inner').style.display = cfg.pollOpen ? 'block' : 'none';
    
    const fill = (id, arr, key, nId) => {
        const c = document.getElementById(id); if(!c) return;
        c.innerHTML = '';
        arr.forEach(t => {
            const b = document.createElement('button'); b.className='opt-btn'; b.textContent=t;
            b.onclick = () => {
                c.querySelectorAll('.opt-btn').forEach(x=>x.classList.remove('selected'));
                b.classList.add('selected'); pdata[key]=t;
                document.getElementById(nId).disabled = false;
            };
            c.appendChild(b);
        });
    };
    fill('opts-gender', ['Kız','Erkek','Diğer'], 'cinsiyet', 'n1');
    fill('opts-class', ['9','10','11','12'], 'sinif', 'n2');
    fill('opts-reason', ['Renk Uyumu','Sadelik','Modern Görünüm'], 'neden', 'n5');

    const g = document.getElementById('poll-logo-grid'); g.innerHTML = '';
    logos.filter(l=>l.img).forEach(l => {
        const d = document.createElement('div'); d.className='logo-card';
        d.innerHTML = `<div class="lc-img"><img src="${l.img}"></div><p style="font-size:12px;margin-top:5px">${l.name}</p>`;
        d.onclick = () => {
            document.querySelectorAll('.logo-card').forEach(x=>x.classList.remove('selected'));
            d.classList.add('selected'); pdata.logo = l.name;
            document.getElementById('n4').disabled = false;
        };
        g.appendChild(d);
    });
    
    cmpPairs = []; cmpIdx = 0; const act = logos.filter(l=>l.img);
    for(let i=0; i<act.length; i++) for(let j=i+1; j<act.length; j++) cmpPairs.push([act[i], act[j]]);
    cmpPairs.sort(()=>Math.random()-0.5);
    renderCmp();
    buildAdminGrid();
}

function renderCmp() {
    const c = document.getElementById('cmp-area');
    const actLogos = logos.filter(l => l.img);
    if(actLogos.length < 2) {
        c.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:gray">Lütfen admin panelinden en az 2 logo yükleyin.</p>';
        return;
    }
    if(cmpIdx >= cmpPairs.length || cmpIdx >= 10) {
        c.innerHTML = '<p style="grid-column:1/-1;text-align:center;background:#eee;padding:1rem;border-radius:10px">Yeterli karşılaştırma yapıldı.</p>';
        document.getElementById('n3').disabled = false; return;
    }
    const p = cmpPairs[cmpIdx];
    document.getElementById('cmp-prog').textContent = `${cmpIdx+1} / ${Math.min(cmpPairs.length, 10)}`;
    c.innerHTML = `
        <div class="cmp-card" onclick="pickCmp('${p[0].name}')"><div class="cmp-img"><img src="${p[0].img}"></div>${p[0].name}</div>
        <div class="vs">VS</div>
        <div class="cmp-card" onclick="pickCmp('${p[1].name}')"><div class="cmp-img"><img src="${p[1].img}"></div>${p[1].name}</div>
    `;
}

function pickCmp(n) { pdata.cmpWins[n] = (pdata.cmpWins[n]||0)+1; cmpIdx++; renderCmp(); }
function rateStar(n) { pdata.yildiz=n; document.querySelectorAll('.star').forEach((s,i)=>s.classList.toggle('lit', i<n)); document.getElementById('n6').disabled=false; }
function go(n) { 
    document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
    document.getElementById('s'+n).classList.add('active');
    document.getElementById('prog').style.width = (n/7*100)+'%';
    window.scrollTo(0,0);
}

async function submitPoll() {
    const b = document.getElementById('n6'); b.disabled = true; b.textContent = '...';
    try {
        const entry = {...pdata, cmpWins: JSON.stringify(pdata.cmpWins), yorum: document.getElementById('yorum').value, zaman: new Date().toISOString()};
        await fetch(`${FB_URL}/votes`, {method:'POST', body:JSON.stringify(toFs(entry))});
        go(7);
    } catch(e) { alert('Hata!'); b.disabled = false; b.textContent = 'GÖNDER'; }
}

function buildAdminGrid() {
    const g = document.getElementById('admin-grid'); if(!g) return;
    g.innerHTML = '';
    logos.forEach((l, i) => {
        const d = document.createElement('div'); d.className='admin-card';
        d.innerHTML = `<div class="img-box" onclick="trigUp(${i})">${l.img?`<img src="${l.img}">`:'Seç'}</div><input value="${l.name}" onchange="logos[${i}].name=this.value" class="logo-name-input">`;
        g.appendChild(d);
    });
}

function tryAdmin() { document.getElementById('admin-overlay').style.display='flex'; }
function chkAdmin() { if(document.getElementById('admin-pass-inp').value === cfg.adminPass) { adminOK=true; document.getElementById('admin-overlay').style.display='none'; switchTab('admin'); } else alert('Hatalı şifre'); }

function switchTab(t) {
    ['admin','poll','results'].forEach(v => {
        document.getElementById('tab-'+v).classList.toggle('active', v===t);
        document.getElementById('view-'+v).classList.toggle('active', v===t);
    });
    if(t==='results') renderResults();
}

async function renderResults() {
    const res = await fetch(`${FB_URL}/votes`).then(r => r.json());
    const v = res.documents ? res.documents.map(d => fromFs(d.fields)) : [];
    const target = document.getElementById('results-inner');
    if(!v.length) { target.innerHTML = "Henüz oy yok."; return; }

    const m = {}; v.forEach(x => m[x.logo] = (m[x.logo]||0)+1);
    const s = Object.entries(m).sort((a,b)=>b[1]-a[1]);

    target.innerHTML = `<h3>Sonuçlar (${v.length} Katılım)</h3><canvas id="resChart" style="margin-top:1rem"></canvas>`;
    new Chart(document.getElementById('resChart'), {
        type: 'bar', data: { labels: s.map(x=>x[0]), datasets: [{ label:'Oy', data: s.map(x=>x[1]), backgroundColor:'#7F77DD' }] }
    });
}

async function clearVotes() { if(confirm('Tüm oylar silinsin mi?')) { const r = await fetch(`${FB_URL}/votes`).then(r=>r.json()); if(r.documents) for(let d of r.documents) await fetch(`https://firestore.googleapis.com/v1/${d.name}`, {method:'DELETE'}); location.reload(); } }

window.onload = loadCfg;
</script>
</body>
</html>
